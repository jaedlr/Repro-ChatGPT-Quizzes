<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Female Hormonal Disorders Interactive Quiz</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #111827;
    }
    .container {
      padding: 24px;
      max-width: 896px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .progress-wrap { flex: 1; }
    .segments {
      display: flex;
      gap: 4px;
    }
    .segment {
      height: 8px;
      border-radius: 9999px;
      flex: 1;
      min-width: 4px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .segment.active { background: #e2e8f0; }
    .segment.answered { background: #6fa8dc; }
    .segment.unanswered { background: #334155; }
    .status {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .count {
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 700;
    }
    .badges {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 700;
    }
    .wrong {
      background: rgba(127, 29, 29, 0.6);
      color: #fee2e2;
    }
    .right {
      background: rgba(6, 78, 59, 0.6);
      color: #d1fae5;
    }
    .card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      background: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #6b7280;
    }
    .stem {
      font-weight: 700;
      margin: 4px 0 0;
      line-height: 1.45;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .option {
      width: 100%;
      text-align: left;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      cursor: pointer;
      font-size: 15px;
      line-height: 1.4;
    }
    .option:hover { background: #f3f4f6; }
    .option.correct {
      background: #dcfce7;
      border-color: #22c55e;
    }
    .option.incorrect {
      background: #fee2e2;
      border-color: #ef4444;
    }
    .explanation {
      margin-top: 8px;
      padding: 12px;
      border-radius: 8px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      font-size: 14px;
      line-height: 1.45;
    }
    .explanation p { margin: 0 0 8px; }
    .green-text { color: #15803d; }
    .red-text { color: #b91c1c; }
    .why-title {
      font-weight: 700;
      margin-top: 8px;
      margin-bottom: 8px;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }
    .nav button {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .nav button:hover { background: #f3f4f6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="progress-wrap">
        <div id="segments" class="segments"></div>
      </div>
      <div class="status">
        <div id="counter" class="count"></div>
        <div class="badges">
          <div class="badge wrong"><span>×</span><span id="wrongCount">0</span></div>
          <div class="badge right"><span>✓</span><span id="rightCount">0</span></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="meta">
        <span id="questionNumber"></span>
        <span id="topic"></span>
      </div>
      <p id="stem" class="stem"></p>
      <div id="options" class="options"></div>
      <div id="explanation" class="explanation" style="display:none;"></div>
      <div class="nav">
        <button onclick="handlePrev()">Previous</button>
        <button onclick="handleNext()">Next</button>
      </div>
    </div>
  </div>

  <script>
    const questions = [{"id": 1, "stem": "A patient has oligomenorrhea, hirsutism, acne, obesity, and polycystic ovaries. Which disorder is most likely", "topic": "PCOS diagnosis", "options": {"A": "Turner syndrome", "B": "Sheehan syndrome", "C": "Polycystic ovary syndrome", "D": "Asherman syndrome"}, "correct": "C", "explanation": "PCOS classically presents with ovulatory dysfunction, hyperandrogenism, and polycystic ovarian morphology.", "optionExplanations": {"A": "Turner syndrome causes primary amenorrhea with streak ovaries and short stature.", "B": "Sheehan syndrome is postpartum pituitary infarction with failure to lactate/amenorrhea.", "C": "Correct. Oligomenorrhea/anovulation plus hyperandrogenism is classic PCOS.", "D": "Asherman syndrome is intrauterine adhesions after curettage/infection causing amenorrhea/infertility."}}, {"id": 2, "stem": "Which hormonal pattern is most characteristic of PCOS", "topic": "PCOS hormones", "options": {"A": "Increased LH relative to FSH with increased ovarian androgen production", "B": "High FSH with streak ovaries", "C": "Low androgens with high progesterone", "D": "Very low LH and very low FSH from pituitary failure"}, "correct": "A", "explanation": "PCOS often has increased LH relative to FSH, stimulating theca cells to produce androgens.", "optionExplanations": {"A": "Correct. ↑ LH → theca cells → ↑ androgens is central to PCOS.", "B": "High FSH with streak ovaries suggests gonadal dysgenesis.", "C": "PCOS is associated with hyperandrogenism and chronic anovulation.", "D": "Low LH/FSH suggests hypothalamic or pituitary hypogonadism."}}, {"id": 3, "stem": "A patient with PCOS has chronic anovulation. Which endometrial complication is increased", "topic": "PCOS complications", "options": {"A": "Placenta previa", "B": "Vasa previa", "C": "Endometrial hyperplasia and endometrial carcinoma", "D": "Cervical ectropion only"}, "correct": "C", "explanation": "Chronic anovulation causes lack of progesterone and unopposed estrogen stimulation, increasing risk of endometrial hyperplasia and carcinoma.", "optionExplanations": {"A": "Placenta previa is a pregnancy placental location disorder.", "B": "Vasa previa involves fetal vessels over the cervical os.", "C": "Correct. Anovulation → no corpus luteum → no progesterone → unopposed estrogen.", "D": "Cervical ectropion is not the key PCOS complication."}}, {"id": 4, "stem": "A patient with PCOS desires endometrial protection but does not currently desire pregnancy. Which therapy is commonly used", "topic": "PCOS treatment", "options": {"A": "RhoGAM", "B": "Combined oral contraceptives or cyclic progestin", "C": "Methotrexate", "D": "Warfarin"}, "correct": "B", "explanation": "Hormonal therapy such as combined oral contraceptives or cyclic progestin protects the endometrium in chronic anovulation.", "optionExplanations": {"A": "RhoGAM prevents Rh alloimmunization.", "B": "Correct. Progestin exposure opposes estrogen and protects the endometrium.", "C": "Methotrexate is used for ectopic pregnancy/medical abortion contexts, not PCOS endometrial protection.", "D": "Warfarin is an anticoagulant and teratogen, not PCOS treatment."}}, {"id": 5, "stem": "A patient with PCOS wants pregnancy. Which medication is commonly used to induce ovulation", "topic": "Ovulation induction", "options": {"A": "Methyldopa", "B": "Magnesium sulfate", "C": "Letrozole or clomiphene", "D": "Finasteride only"}, "correct": "C", "explanation": "Ovulation induction in PCOS commonly uses letrozole or clomiphene.", "optionExplanations": {"A": "Methyldopa treats hypertension in pregnancy.", "B": "Magnesium sulfate prevents seizures in severe preeclampsia.", "C": "Correct. Letrozole/clomiphene promote ovulation.", "D": "Finasteride is antiandrogenic/teratogenic and not ovulation induction."}}, {"id": 6, "stem": "A patient has galactorrhea, amenorrhea, headaches, and visual field defects. Which diagnosis is most likely", "topic": "Hyperprolactinemia", "options": {"A": "Endometriosis", "B": "Primary ovarian insufficiency", "C": "PCOS", "D": "Prolactinoma"}, "correct": "D", "explanation": "Hyperprolactinemia from prolactinoma can cause galactorrhea, amenorrhea, infertility, headaches, and visual symptoms from mass effect.", "optionExplanations": {"A": "Endometriosis causes pelvic pain, dysmenorrhea, dyspareunia, and infertility.", "B": "Primary ovarian insufficiency causes high FSH and hypoestrogenism.", "C": "PCOS causes hyperandrogenism and ovulatory dysfunction, not typically galactorrhea/mass effect.", "D": "Correct. Galactorrhea + amenorrhea + mass symptoms suggests prolactinoma."}}, {"id": 7, "stem": "How does hyperprolactinemia cause amenorrhea", "topic": "Prolactin mechanism", "options": {"A": "Prolactin increases fetal hCG", "B": "Prolactin increases progesterone from the corpus luteum", "C": "Prolactin suppresses GnRH, decreasing LH and FSH", "D": "Prolactin directly increases ovulation"}, "correct": "C", "explanation": "Elevated prolactin suppresses GnRH, which decreases LH/FSH and causes anovulation/amenorrhea.", "optionExplanations": {"A": "hCG is produced by trophoblasts/placenta, not prolactin.", "B": "Hyperprolactinemia causes anovulation, so corpus luteum function is reduced.", "C": "Correct. ↑ prolactin → ↓ GnRH → ↓ LH/FSH → amenorrhea.", "D": "Prolactin inhibits reproductive axis function rather than increasing ovulation."}}, {"id": 8, "stem": "A patient has prolactinoma causing amenorrhea. Which first-line medication class is used", "topic": "Prolactinoma treatment", "options": {"A": "Dopamine antagonists such as risperidone", "B": "GnRH agonist only", "C": "Dopamine agonists such as cabergoline or bromocriptine", "D": "Aromatase inhibitors only"}, "correct": "C", "explanation": "Dopamine agonists decrease prolactin secretion and are first-line for prolactinoma.", "optionExplanations": {"A": "Dopamine antagonists can cause hyperprolactinemia.", "B": "GnRH agonists are used for conditions like endometriosis, not first-line prolactinoma.", "C": "Correct. Cabergoline/bromocriptine treat hyperprolactinemia.", "D": "Aromatase inhibitors induce ovulation in PCOS but do not treat prolactinoma directly."}}, {"id": 9, "stem": "A patient develops galactorrhea and amenorrhea after starting risperidone. What is the mechanism", "topic": "Medication-induced hyperprolactinemia", "options": {"A": "Placental hCG excess", "B": "Direct ovarian androgen excess", "C": "Dopamine receptor blockade increases prolactin", "D": "Permanent destruction of the uterus"}, "correct": "C", "explanation": "Dopamine normally inhibits prolactin. Dopamine antagonists such as risperidone can increase prolactin and cause galactorrhea/amenorrhea.", "optionExplanations": {"A": "hCG excess is related to pregnancy/trophoblastic disease.", "B": "Ovarian androgen excess is more relevant to PCOS.", "C": "Correct. Blocking dopamine removes prolactin inhibition.", "D": "Uterine destruction is not the mechanism."}}, {"id": 10, "stem": "A 16 year old has primary amenorrhea, short stature, webbed neck, widely spaced nipples, and streak ovaries. Which diagnosis is most likely", "topic": "Turner syndrome", "options": {"A": "Mayer-Rokitansky-Küster-Hauser syndrome", "B": "Turner syndrome", "C": "PCOS", "D": "Androgen insensitivity syndrome"}, "correct": "B", "explanation": "Turner syndrome classically causes primary amenorrhea with short stature, webbed neck, widely spaced nipples, and streak ovaries.", "optionExplanations": {"A": "MRKH has absent uterus/upper vagina with normal ovaries and normal secondary sex characteristics.", "B": "Correct. These features are classic for Turner syndrome.", "C": "PCOS usually causes secondary oligomenorrhea with hyperandrogenism.", "D": "Androgen insensitivity is 46,XY with female external genitalia and absent uterus."}}, {"id": 11, "stem": "A patient has primary amenorrhea with high FSH and low estrogen. Which category best explains this pattern", "topic": "Primary ovarian insufficiency", "options": {"A": "Pregnancy", "B": "Primary ovarian failure", "C": "Hypothalamic suppression", "D": "Pituitary failure"}, "correct": "B", "explanation": "High FSH with low estrogen indicates primary ovarian failure/primary ovarian insufficiency because the pituitary is responding appropriately to low ovarian hormone output.", "optionExplanations": {"A": "Pregnancy causes amenorrhea with elevated hCG, not high FSH.", "B": "Correct. Ovarian failure → ↓ estrogen → loss of feedback → ↑ FSH.", "C": "Hypothalamic suppression usually causes low/normal FSH and LH.", "D": "Pituitary failure causes low gonadotropins."}}, {"id": 12, "stem": "A 15 year old has primary amenorrhea, normal breast development, absent uterus on ultrasound, and normal ovaries. Which diagnosis is most likely", "topic": "MRKH syndrome", "options": {"A": "Complete androgen insensitivity syndrome", "B": "Mayer-Rokitansky-Küster-Hauser syndrome", "C": "Turner syndrome", "D": "Sheehan syndrome"}, "correct": "B", "explanation": "MRKH syndrome causes congenital absence or hypoplasia of the uterus/upper vagina with normal ovaries and normal secondary sex characteristics.", "optionExplanations": {"A": "CAIS has 46,XY testes, absent uterus, and scant/absent pubic hair.", "B": "Correct. Absent uterus + normal ovaries/breasts suggests MRKH.", "C": "Turner syndrome causes streak ovaries and poor breast development without estrogen therapy.", "D": "Sheehan syndrome is postpartum pituitary infarction."}}, {"id": 13, "stem": "A patient has primary amenorrhea, female external genitalia, absent uterus, scant pubic hair, and testes present. Which diagnosis is most likely", "topic": "Complete androgen insensitivity", "options": {"A": "Turner syndrome", "B": "PCOS", "C": "Complete androgen insensitivity syndrome", "D": "MRKH syndrome"}, "correct": "C", "explanation": "Complete androgen insensitivity is 46,XY with androgen receptor resistance, female external genitalia, absent uterus due to AMH, testes, and scant/absent pubic hair.", "optionExplanations": {"A": "Turner syndrome has streak ovaries and 45,X features.", "B": "PCOS causes hyperandrogenism and usually secondary oligomenorrhea.", "C": "Correct. Absent uterus + testes + scant pubic hair suggests CAIS.", "D": "MRKH has absent uterus but normal ovaries and normal pubic hair."}}, {"id": 14, "stem": "A patient has secondary amenorrhea after severe postpartum hemorrhage and cannot lactate. Which disorder is most likely", "topic": "Sheehan syndrome", "options": {"A": "MRKH syndrome", "B": "PCOS", "C": "Prolactinoma", "D": "Sheehan syndrome"}, "correct": "D", "explanation": "Sheehan syndrome is postpartum pituitary infarction due to severe hemorrhage/hypotension, causing failure to lactate and amenorrhea.", "optionExplanations": {"A": "MRKH causes primary amenorrhea from congenital absent uterus.", "B": "PCOS is unrelated to acute postpartum pituitary infarction.", "C": "Prolactinoma causes elevated prolactin/galactorrhea rather than failure to lactate.", "D": "Correct. Postpartum hemorrhage + failure to lactate = Sheehan syndrome."}}, {"id": 15, "stem": "A patient has amenorrhea after repeated dilation and curettage for postpartum retained products. Imaging suggests intrauterine adhesions. Which diagnosis is most likely", "topic": "Asherman syndrome", "options": {"A": "PCOS", "B": "Prolactinoma", "C": "Asherman syndrome", "D": "Turner syndrome"}, "correct": "C", "explanation": "Asherman syndrome is intrauterine adhesions/scarring, often after D&C or infection, causing amenorrhea, infertility, or recurrent pregnancy loss.", "optionExplanations": {"A": "PCOS causes chronic anovulation/hyperandrogenism.", "B": "Prolactinoma causes galactorrhea and high prolactin.", "C": "Correct. Amenorrhea after D&C from intrauterine adhesions = Asherman syndrome.", "D": "Turner syndrome is congenital gonadal dysgenesis."}}, {"id": 16, "stem": "A patient has amenorrhea, low BMI, intense exercise, stress, low estrogen, and low/normal FSH and LH. Which diagnosis best fits", "topic": "Functional hypothalamic amenorrhea", "options": {"A": "Complete androgen insensitivity", "B": "Functional hypothalamic amenorrhea", "C": "Primary ovarian insufficiency", "D": "PCOS"}, "correct": "B", "explanation": "Functional hypothalamic amenorrhea is due to decreased GnRH from stress, weight loss, undernutrition, or excessive exercise, causing low estrogen and low/normal gonadotropins.", "optionExplanations": {"A": "CAIS causes primary amenorrhea with absent uterus/testes and scant pubic hair.", "B": "Correct. Stress/low BMI/exercise → ↓ GnRH → amenorrhea.", "C": "Primary ovarian insufficiency has high FSH.", "D": "PCOS usually has hyperandrogenism and normal estrogen exposure."}}, {"id": 17, "stem": "A patient has hot flashes, vaginal dryness, sleep disturbance, mood symptoms, and 12 months of amenorrhea at age 52. Which diagnosis is most likely", "topic": "Menopause", "options": {"A": "PCOS", "B": "Menopause", "C": "Prolactinoma", "D": "Ectopic pregnancy"}, "correct": "B", "explanation": "Menopause is diagnosed clinically after 12 months of amenorrhea, commonly with vasomotor symptoms and genitourinary symptoms from hypoestrogenism.", "optionExplanations": {"A": "PCOS presents earlier with hyperandrogenism/oligomenorrhea.", "B": "Correct. Age 52 + 12 months amenorrhea + hypoestrogenic symptoms = menopause.", "C": "Prolactinoma causes galactorrhea and amenorrhea.", "D": "Ectopic pregnancy presents with early pregnancy pain/bleeding."}}, {"id": 18, "stem": "Which hormonal pattern is expected in menopause", "topic": "Menopause hormones", "options": {"A": "High progesterone from corpus luteum activity", "B": "Increased hCG", "C": "Increased estrogen with low FSH", "D": "Decreased estrogen with increased FSH"}, "correct": "D", "explanation": "Menopause results from ovarian follicle depletion, causing decreased estrogen and loss of negative feedback with increased FSH.", "optionExplanations": {"A": "Corpus luteum activity declines with anovulation/ovarian failure.", "B": "hCG is associated with pregnancy/trophoblastic tissue.", "C": "This is the opposite of menopause.", "D": "Correct. Menopause = ↓ estrogen, ↑ FSH."}}, {"id": 19, "stem": "A postmenopausal patient has isolated vaginal dryness and dyspareunia without systemic vasomotor symptoms. Which treatment is most targeted", "topic": "Genitourinary syndrome of menopause", "options": {"A": "Magnesium sulfate", "B": "Methotrexate", "C": "Local vaginal estrogen therapy", "D": "RhoGAM"}, "correct": "C", "explanation": "Local vaginal estrogen is useful for isolated genitourinary symptoms of menopause such as vaginal dryness, atrophy, and dyspareunia.", "optionExplanations": {"A": "Magnesium sulfate prevents eclamptic seizures.", "B": "Methotrexate is not used for menopausal vaginal atrophy.", "C": "Correct. Local estrogen targets vaginal atrophy symptoms.", "D": "RhoGAM prevents Rh alloimmunization."}}, {"id": 20, "stem": "A patient has absent menses for 4 months. Pregnancy test is negative. Which diagnostic category best describes this symptom", "topic": "Secondary amenorrhea definition", "options": {"A": "Menorrhagia", "B": "Metrorrhagia", "C": "Secondary amenorrhea", "D": "Primary amenorrhea"}, "correct": "C", "explanation": "Secondary amenorrhea is absence of menses in a patient who previously had menses, commonly defined by absence for at least 3 months in previously regular cycles or 6 months in irregular cycles.", "optionExplanations": {"A": "Menorrhagia is heavy/prolonged regular bleeding.", "B": "Metrorrhagia is irregular bleeding.", "C": "Correct. Previously menstruating patient with several months of no menses = secondary amenorrhea.", "D": "Primary amenorrhea refers to delayed onset of first menses."}}];

    let currentIndex = 0;
    const answers = {};

    function render() {
      const currentQuestion = questions[currentIndex];
      const selectedChoice = answers[currentQuestion.id] || null;
      const showExplanation = selectedChoice !== null;

      document.getElementById('counter').textContent = `${currentIndex + 1} / ${questions.length}`;
      document.getElementById('questionNumber').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
      document.getElementById('topic').textContent = currentQuestion.topic ? `Topic: ${currentQuestion.topic}` : '';
      document.getElementById('stem').textContent = `${currentQuestion.stem}?`;

      const segments = document.getElementById('segments');
      segments.innerHTML = '';
      questions.forEach((q, idx) => {
        const btn = document.createElement('button');
        btn.className = 'segment ' + (idx === currentIndex ? 'active' : answers[q.id] !== undefined ? 'answered' : 'unanswered');
        btn.title = q.topic || `Question ${idx + 1}`;
        btn.onclick = () => {
          currentIndex = idx;
          render();
        };
        segments.appendChild(btn);
      });

      const options = document.getElementById('options');
      options.innerHTML = '';
      Object.entries(currentQuestion.options).forEach(([letter, text]) => {
        const btn = document.createElement('button');
        const isSelected = selectedChoice === letter;
        const isAnswer = letter === currentQuestion.correct;
        btn.className = 'option';
        if (showExplanation && isAnswer) btn.className += ' correct';
        else if (showExplanation && isSelected && !isAnswer) btn.className += ' incorrect';
        btn.innerHTML = `<strong>${letter}.</strong> ${text}`;
        btn.onclick = () => {
          answers[currentQuestion.id] = letter;
          render();
        };
        options.appendChild(btn);
      });

      const explanation = document.getElementById('explanation');
      if (showExplanation) {
        const isCorrect = selectedChoice === currentQuestion.correct;
        const optionExplanationHtml = Object.entries(currentQuestion.optionExplanations)
          .map(([letter, text]) => `<p><strong>${letter}.</strong> ${text}</p>`)
          .join('');

        explanation.style.display = 'block';
        explanation.innerHTML = `
          <p><strong>Correct answer: ${currentQuestion.correct}</strong> (${currentQuestion.options[currentQuestion.correct]})</p>
          <p class="${isCorrect ? 'green-text' : 'red-text'}">${isCorrect ? 'Nice job. ' : 'Good attempt. '}${currentQuestion.explanation}</p>
          <div class="why-title">Why each option is right or wrong:</div>
          ${optionExplanationHtml}
        `;
      } else {
        explanation.style.display = 'none';
        explanation.innerHTML = '';
      }

      let wrong = 0;
      let right = 0;
      Object.entries(answers).forEach(([qid, choice]) => {
        const q = questions.find((qq) => qq.id === Number(qid));
        if (q && choice === q.correct) right += 1;
        if (q && choice !== q.correct) wrong += 1;
      });
      document.getElementById('wrongCount').textContent = wrong;
      document.getElementById('rightCount').textContent = right;
    }

    function handleNext() {
      currentIndex += 1;
      if (currentIndex >= questions.length) currentIndex = 0;
      render();
    }

    function handlePrev() {
      currentIndex -= 1;
      if (currentIndex < 0) currentIndex = questions.length - 1;
      render();
    }

    render();
  </script>
</body>
</html>
