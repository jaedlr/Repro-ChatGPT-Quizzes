<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

</head>

    const questions = [

      },
      {

      {
        id: 10,
        stem: "A woman treated for gonorrhea asks when she can resume sex. Which instruction is best",

        optionExplanations: {

      },
      {
        id: 11,
        stem: "A woman was treated for chlamydia with the recommended regimen. She is not pregnant, symptoms resolved, and adherence is reliable. What follow-up testing is recommended",

        }
      },
      {
        id: 12,
        stem: "A pregnant woman completes treatment for chlamydia. What follow-up is specifically recommended",

        options: {

          D: "Dark-field microscopy of urine"
        },
        correct: "A",
        explanation: "Test of cure with repeat testing 3-4 weeks after completing therapy is recommended in pregnant women.",
        optionExplanations: {
          A: "Correct. Pregnancy is an exception requiring test of cure.",
          B: "Incorrect. Pregnancy is specifically listed as an indication for test of cure.",

          D: "Incorrect. Dark-field microscopy is not performed on urine for chlamydia follow-up."
        }
      },
      {
        id: 13,
        stem: "A patient diagnosed with gonorrhea says her partner refuses to come in for evaluation. Which approach is described as giving the partner STI medication without physical evaluation or testing",

        options: {
          A: "Test of cure",
          B: "Expedited partner therapy",
          C: "Dark-field confirmation",

        },
        correct: "B",
        explanation: "Expedited partner therapy means a patient’s sexual partner receives STI drug therapy without undergoing physical evaluation or testing. ACOG supports its use according to CDC guidelines, although some states restrict it.",
        optionExplanations: {
          A: "Incorrect. Test of cure checks for eradication after treatment.",
          B: "Correct. This is expedited partner therapy.",
          C: "Incorrect. Dark-field confirmation applies to syphilis diagnosis.",
          D: "Incorrect. Latent-stage treatment refers to syphilis management."
        }
      },
      {
        id: 14,
        stem: "A patient has recurrent painful genital herpes outbreaks with prodromal tingling and burning. What medication strategy should be offered if recurrences are frequent or severe",
        topic: "HSV management",
        options: {
          A: "Long-term acyclovir or valacyclovir therapy",
          B: "Weekly penicillin injections",
          C: "Ceftriaxone plus azithromycin",
          D: "No treatment because recurrent episodes are always harmless"
        },
        correct: "A",
        explanation: "Acyclovir or valacyclovir decreases severity and duration of primary and secondary HSV outbreaks. Long-term therapy should be offered for frequent or severe recurrences.",
        optionExplanations: {
          A: "Correct. Suppressive antiviral therapy is appropriate for frequent/severe recurrences.",
          B: "Incorrect. Penicillin treats syphilis.",
          C: "Incorrect. Ceftriaxone plus azithromycin treats gonorrhea in the lecture.",
          D: "Incorrect. Treatment can reduce severity and duration."
        }
      },
      {
        id: 15,
        stem: "A patient has a first episode of painful genital vesicles and ulcers. What diagnostic principle is emphasized in the lecture",
        topic: "HSV diagnostic management",
        options: {
          A: "Initial episodes should be laboratory-confirmed, preferably by PCR from ulcers or mucocutaneous sites",
          B: "Diagnosis should never be confirmed in initial episodes",

        },
        correct: "A",
        explanation: "PCR specimens from ulcers or mucocutaneous sites are the most sensitive test for HSV, and all initial episodes should be laboratory-confirmed.",
        optionExplanations: {
          A: "Correct. PCR is preferred and initial episodes should be confirmed.",
          B: "Incorrect. The lecture specifically says initial episodes should be laboratory-confirmed.",

          D: "Incorrect. Urine culture is not the recommended HSV diagnostic test."
        }
      },
      {
        id: 16,
        stem: "A man with a painless hard chancre is diagnosed with primary syphilis. What treatment is listed for primary syphilis",
        topic: "Primary syphilis treatment",
        options: {
          A: "Penicillin G 2.4 million units IM once",
          B: "Penicillin G 2.4 million units IM weekly for 3 weeks",
          C: "IV penicillin every 4 hours for 10-14 days",
          D: "Doxycycline 100 mg BID for 21 days"
        },
        correct: "A",
        explanation: "Primary, secondary, and early latent syphilis are treated with penicillin G 2.4 million units IM as a single dose.",
        optionExplanations: {
          A: "Correct. This is the regimen for primary syphilis.",
          B: "Incorrect. This is for late latent or tertiary syphilis without neurologic signs.",
          C: "Incorrect. This is for tertiary syphilis with neurologic signs/neurosyphilis.",
          D: "Incorrect. This treats LGV."
        }
      },
      {
        id: 17,
        stem: "A patient has positive syphilis serology but no symptoms. The infection occurred more than one year after the secondary stage. What treatment is listed",
        topic: "Late latent syphilis treatment",
        options: {
          A: "Acyclovir for 7 days",
          B: "Penicillin G 2.4 million units IM weekly for 3 weeks",
          C: "Ceftriaxone IM once plus azithromycin once",
          D: "Azithromycin weekly until healed"
        },
        correct: "B",
        explanation: "Late latent syphilis, defined as more than one year after the secondary stage, is treated with penicillin G 2.4 million units IM weekly for 3 weeks.",
        optionExplanations: {
          A: "Incorrect. Acyclovir treats HSV.",

          D: "Incorrect. This treats granuloma inguinale."
        }
      },
      {
        id: 18,
        stem: "A patient has suspected neurosyphilis with seizures. Which diagnostic approach is listed in the lecture",
        topic: "Neurosyphilis diagnosis",
        options: {
          A: "Lumbar puncture with CSF RPR and FTA-ABS",

          D: "Donovan body identification"
        },
        correct: "A",
        explanation: "For neurosyphilis, the lecture lists lumbar puncture with RPR of CSF and FTA-ABS.",
        optionExplanations: {
          A: "Correct. CSF testing is used for neurosyphilis.",
          B: "Incorrect. Urine NAAT is for GC/CT.",
          C: "Incorrect. Special culture media is for chancroid.",
          D: "Incorrect. Donovan bodies are for granuloma inguinale."
        }
      },
      {
        id: 19,
        stem: "A patient has a painful genital ulcer and painful suppurative inguinal buboes. Special culture media is available but has sensitivity below 80%. Which treatment is listed",
        topic: "Chancroid management",
        options: {
          A: "Azithromycin 1 g orally once",
          B: "Doxycycline for 21 days",
          C: "Penicillin G IM once",
          D: "Acyclovir long-term suppression"
        },
        correct: "A",
        explanation: "Chancroid due to Haemophilus ducreyi presents with painful genital ulcer and painful suppurative adenopathy. Treatment is azithromycin 1 g orally as a single dose.",
        optionExplanations: {
          A: "Correct. This is listed treatment for chancroid.",

          C: "Incorrect. Penicillin G treats syphilis.",
          D: "Incorrect. Acyclovir treats HSV."
        }
      },
      {
        id: 20,
        stem: "A patient has a painless beefy-red ulcer that bleeds easily. Smear shows Donovan bodies. Which management is listed",
        topic: "Granuloma inguinale management",
        options: {
          A: "IV ceftriaxone for at least 24 hours",
          B: "Azithromycin 1 g orally weekly until healed",
          C: "Penicillin G 2.4 million units IM once",
          D: "No treatment because it heals spontaneously"
        },
        correct: "B",
        explanation: "Granuloma inguinale due to Klebsiella granulomatis causes painless beefy-red ulcers that bleed easily. Treatment is azithromycin 1 g orally weekly until healed.",
        optionExplanations: {
          A: "Incorrect. This is for disseminated gonococcal infection.",
          B: "Correct. Weekly azithromycin until healed is listed for granuloma inguinale.",
          C: "Incorrect. Penicillin G treats syphilis.",
          D: "Incorrect. Treatment is recommended."
        }
      }
    ];

    function Quiz() {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [answers, setAnswers] = useState({});

      const currentQuestion = questions[currentIndex];
      const selectedChoice =
        answers[currentQuestion.id] !== undefined ? answers[currentQuestion.id] : null;
      const showExplanation = selectedChoice !== null;

      const handleSelect = (letter) => {
        setAnswers((prev) => ({ ...prev, [currentQuestion.id]: letter }));
      };

      const goToQuestion = (index) => {
        let newIndex = index;
        if (newIndex < 0) newIndex = questions.length - 1;
        if (newIndex >= questions.length) newIndex = 0;
        setCurrentIndex(newIndex);
      };

      const handleNext = () => goToQuestion(currentIndex + 1);
      const handlePrev = () => goToQuestion(currentIndex - 1);

      const isCorrect =
        selectedChoice !== null && selectedChoice === currentQuestion.correct;

      return (
        <div className="p-6 max-w-4xl mx-auto space-y-4">
          <div className="flex items-center justify-between gap-3">
            <div className="flex-1">
              <div className="flex gap-1">
                {questions.map((q, idx) => {
                  const answered = answers[q.id] !== undefined;
                  const isActive = idx === currentIndex;
                  const cls =
                    "h-2 rounded-full transition-colors cursor-pointer flex-1 min-w-[4px] " +
                    (isActive
                      ? "bg-slate-200"
                      : answered
                      ? "bg-[#6fa8dc]"
                      : "bg-slate-700");
                  return (
                    <button
                      key={q.id}
                      className={cls}
                      onClick={() => setCurrentIndex(idx)}
                      aria-label={`Go to question ${idx + 1}`}
                      title={q.topic || `Question ${idx + 1}`}
                    />
                  );
                })}
              </div>
            </div>
            <div className="flex items-center gap-3 flex-shrink-0">
              <div className="text-slate-200 text-sm font-semibold">
                {currentIndex + 1} / {questions.length}
              </div>
              <div className="flex items-center gap-2">
                <div className="flex items-center gap-2 px-3 py-1 rounded-full bg-red-900/60 text-red-100 text-sm font-semibold">
                  <span className="text-base">×</span>
                  <span>
                    {Object.entries(answers).filter(([qid, choice]) => {
                      const q = questions.find((qq) => qq.id === Number(qid));
                      return q && choice !== q.correct;
                    }).length}
                  </span>
                </div>
                <div className="flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-900/60 text-emerald-100 text-sm font-semibold">
                  <span className="text-base">✓</span>
                  <span>
                    {Object.entries(answers).filter(([qid, choice]) => {
                      const q = questions.find((qq) => qq.id === Number(qid));
                      return q && choice === q.correct;
                    }).length}
                  </span>
                </div>
              </div>
            </div>
          </div>

          <div className="border rounded-xl p-4 shadow-md bg-white space-y-4">
            <div className="flex justify-between text-xs text-gray-500">
              <span>Question {currentIndex + 1} of {questions.length}</span>
              {currentQuestion.topic ? <span>Topic: {currentQuestion.topic}</span> : null}
            </div>
            <p className="font-semibold mt-1">{currentQuestion.stem}?</p>
            <div className="mt-3 space-y-2">
              {Object.entries(currentQuestion.options).map(([letter, text]) => {
                const isSelected = selectedChoice === letter;
                const isAnswer = letter === currentQuestion.correct;
                let classes =
                  "w-full text-left p-2 rounded-lg border bg-gray-50 hover:bg-gray-100";
                if (showExplanation && isAnswer) {
                  classes =
                    "w-full text-left p-2 rounded-lg border bg-green-100 border-green-500";
                } else if (showExplanation && isSelected && !isAnswer) {
                  classes =
                    "w-full text-left p-2 rounded-lg border bg-red-100 border-red-500";
                } else if (isSelected && !showExplanation) {
                  classes = "w-full text-left p-2 rounded-lg border bg-gray-100";
                }
                return (
                  <button key={letter} onClick={() => handleSelect(letter)} className={classes}>
                    <strong>{letter}.</strong> {" "}{text}
                  </button>
                );
              })}
            </div>
            {showExplanation && (
              <div className="mt-4 p-3 rounded-lg bg-gray-50 border text-sm space-y-2">
                <p><strong>Correct answer: {currentQuestion.correct}</strong>{" "}({currentQuestion.options[currentQuestion.correct]})</p>
                <p className={isCorrect ? "text-green-700" : "text-red-700"}>
                  {isCorrect ? "Nice job. " : "Good attempt. "}{currentQuestion.explanation}
                </p>
                {currentQuestion.optionExplanations ? (
                  <div className="mt-2 space-y-1">
                    <p className="font-semibold">Why each option is right or wrong:</p>
                    {Object.entries(currentQuestion.optionExplanations).map(([letter, text]) => (
                      <p key={letter}><strong>{letter}.</strong> {" "}{text}</p>
                    ))}
                  </div>
                ) : null}
              </div>
            )}
            <div className="flex justify-between mt-4">
              <button onClick={handlePrev} className="inline-flex items-center px-3 py-2 rounded-lg border text-xs font-medium hover:bg-gray-100">Previous</button>
              <button onClick={handleNext} className="inline-flex items-center px-3 py-2 rounded-lg border text-xs font-medium hover:bg-gray-100">Next</button>
            </div>
          </div>
          <p className="text-xs text-gray-500"></p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Quiz />);
  </script>
</body>
</html>
