<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breast Disease Interactive Quiz</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #111827;
    }
    .container {
      padding: 24px;
      max-width: 896px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .progress-wrap { flex: 1; }
    .segments {
      display: flex;
      gap: 4px;
    }
    .segment {
      height: 8px;
      border-radius: 9999px;
      flex: 1;
      min-width: 4px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .segment.active { background: #e2e8f0; }
    .segment.answered { background: #6fa8dc; }
    .segment.unanswered { background: #334155; }
    .status {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .count {
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 700;
    }
    .badges {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 700;
    }
    .wrong {
      background: rgba(127, 29, 29, 0.6);
      color: #fee2e2;
    }
    .right {
      background: rgba(6, 78, 59, 0.6);
      color: #d1fae5;
    }
    .card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      background: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #6b7280;
    }
    .stem {
      font-weight: 700;
      margin: 4px 0 0;
      line-height: 1.45;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .option {
      width: 100%;
      text-align: left;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      cursor: pointer;
      font-size: 15px;
      line-height: 1.4;
    }
    .option:hover { background: #f3f4f6; }
    .option.correct {
      background: #dcfce7;
      border-color: #22c55e;
    }
    .option.incorrect {
      background: #fee2e2;
      border-color: #ef4444;
    }
    .explanation {
      margin-top: 8px;
      padding: 12px;
      border-radius: 8px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      font-size: 14px;
      line-height: 1.45;
    }
    .explanation p { margin: 0 0 8px; }
    .green-text { color: #15803d; }
    .red-text { color: #b91c1c; }
    .why-title {
      font-weight: 700;
      margin-top: 8px;
      margin-bottom: 8px;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }
    .nav button {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .nav button:hover { background: #f3f4f6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="progress-wrap">
        <div id="segments" class="segments"></div>
      </div>
      <div class="status">
        <div id="counter" class="count"></div>
        <div class="badges">
          <div class="badge wrong"><span>×</span><span id="wrongCount">0</span></div>
          <div class="badge right"><span>✓</span><span id="rightCount">0</span></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="meta">
        <span id="questionNumber"></span>
        <span id="topic"></span>
      </div>
      <p id="stem" class="stem"></p>
      <div id="options" class="options"></div>
      <div id="explanation" class="explanation" style="display:none;"></div>
      <div class="nav">
        <button onclick="handlePrev()">Previous</button>
        <button onclick="handleNext()">Next</button>
      </div>
    </div>
  </div>

  <script>
    const questions = 
[
  {

  {

  {

  {
    id: 10,
    stem: 'A woman has eczematous changes of the nipple. Biopsy shows malignant cells with clear cytoplasm infiltrating the epidermis from an underlying DCIS through lactiferous ducts. What is the diagnosis',

  {

  {

    options: {
      A: 'Medullary carcinoma',

    },

    optionExplanations: {
      A: 'Correct. Triple-negative tumor with prominent lymphoplasmacytic infiltrate fits medullary carcinoma.',
      B: 'Mucinous carcinoma occurs in older women, is usually ER positive, and has mucin pools.',

  },
  {
    id: 14,
    stem: 'An older woman has a soft, well-circumscribed gelatinous breast mass. Histology shows small clusters of tumor cells floating in abundant extracellular mucin. Which prognosis and receptor pattern is most likely',

    },
    correct: 'B',
    explanation: 'Mucinous carcinoma usually occurs in older women, is soft/gelatinous, grows slowly, is often ER positive, and has a good prognosis.',
    optionExplanations: {
      A: 'HER2 overexpression is a poor prognostic factor but not the classic mucinous pattern.',
      B: 'Correct. Mucinous carcinoma is typically ER positive with good prognosis.',
      C: 'Triple-negative pattern is more associated with medullary carcinoma.',
      D: 'E-cadherin negativity and bilaterality are associated with lobular carcinoma.'
    }
  },
  {
    id: 15,
    stem: 'A breast carcinoma is composed of well-formed tubules but lacks a myoepithelial layer. It appears as an irregular mammographic density and has excellent prognosis. Which subtype is this',
    topic: 'Tubular carcinoma',
    options: {
      A: 'Tubular carcinoma',
      B: 'Comedo DCIS',

      D: 'Fibroadenoma'
    },
    correct: 'A',
    explanation: 'Tubular carcinoma is a well-differentiated invasive carcinoma composed of well-formed tubules without myoepithelial layer, often ER positive and associated with excellent prognosis.',
    optionExplanations: {
      A: 'Correct. Well-formed invasive tubules without myoepithelial layer fit tubular carcinoma.',

    }
  },
  {
    id: 16,
    stem: 'A 23 year old woman has a mobile, rubbery, sharply circumscribed breast mass. Histology shows a benign stromal tumor compressing ducts. What is the most likely diagnosis',

    options: {

    },
    correct: 'A',

      A: 'Correct. Young woman with mobile rubbery mass fits fibroadenoma.',

  },
  {

    stem: 'A 60 year old woman has a large breast tumor with leaflike architecture, stromal cellularity, cytologic atypia, and stromal overgrowth. High-grade forms can metastasize, but lymph node dissection is not typically performed. What is the treatment',

    optionExplanations: {

  {
    id: 20,
    stem: 'A patient has multiple relatives with breast and ovarian cancer. Genetic testing reveals a BRCA1 mutation. Which chromosome and cancer association is most accurate',

;

    let currentIndex = 0;
    const answers = {};

    function render() {
      const currentQuestion = questions[currentIndex];
      const selectedChoice = answers[currentQuestion.id] || null;
      const showExplanation = selectedChoice !== null;

      document.getElementById('counter').textContent = `${currentIndex + 1} / ${questions.length}`;
      document.getElementById('questionNumber').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
      document.getElementById('topic').textContent = currentQuestion.topic ? `Topic: ${currentQuestion.topic}` : '';
      document.getElementById('stem').textContent = `${currentQuestion.stem}?`;

      const segments = document.getElementById('segments');
      segments.innerHTML = '';
      questions.forEach((q, idx) => {
        const btn = document.createElement('button');
        btn.className = 'segment ' + (idx === currentIndex ? 'active' : answers[q.id] !== undefined ? 'answered' : 'unanswered');
        btn.title = q.topic || `Question ${idx + 1}`;
        btn.onclick = () => {
          currentIndex = idx;
          render();
        };
        segments.appendChild(btn);
      });

      const options = document.getElementById('options');
      options.innerHTML = '';
      Object.entries(currentQuestion.options).forEach(([letter, text]) => {
        const btn = document.createElement('button');
        const isSelected = selectedChoice === letter;
        const isAnswer = letter === currentQuestion.correct;
        btn.className = 'option';
        if (showExplanation && isAnswer) btn.className += ' correct';
        else if (showExplanation && isSelected && !isAnswer) btn.className += ' incorrect';
        btn.innerHTML = `<strong>${letter}.</strong> ${text}`;
        btn.onclick = () => {
          answers[currentQuestion.id] = letter;
          render();
        };
        options.appendChild(btn);
      });

      const explanation = document.getElementById('explanation');
      if (showExplanation) {
        const isCorrect = selectedChoice === currentQuestion.correct;
        const optionExplanationHtml = Object.entries(currentQuestion.optionExplanations)
          .map(([letter, text]) => `<p><strong>${letter}.</strong> ${text}</p>`)
          .join('');

        explanation.style.display = 'block';
        explanation.innerHTML = `
          <p><strong>Correct answer: ${currentQuestion.correct}</strong> (${currentQuestion.options[currentQuestion.correct]})</p>
          <p class="${isCorrect ? 'green-text' : 'red-text'}">${isCorrect ? 'Nice job. ' : 'Good attempt. '}${currentQuestion.explanation}</p>
          <div class="why-title">Why each option is right or wrong:</div>
          ${optionExplanationHtml}
        `;
      } else {
        explanation.style.display = 'none';
        explanation.innerHTML = '';
      }

      let wrong = 0;
      let right = 0;
      Object.entries(answers).forEach(([qid, choice]) => {
        const q = questions.find((qq) => qq.id === Number(qid));
        if (q && choice === q.correct) right += 1;
        if (q && choice !== q.correct) wrong += 1;
      });
      document.getElementById('wrongCount').textContent = wrong;
      document.getElementById('rightCount').textContent = right;
    }

    function handleNext() {
      currentIndex += 1;
      if (currentIndex >= questions.length) currentIndex = 0;
      render();
    }

    function handlePrev() {
      currentIndex -= 1;
      if (currentIndex < 0) currentIndex = questions.length - 1;
      render();
    }

    render();
  </script>
</body>
</html>
