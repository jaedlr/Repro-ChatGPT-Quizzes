<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUB Endometrial Cancer Interactive Quiz</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;

    }
    .container {
      padding: 24px;

    }

      gap: 12px;
    }
    .progress-wrap { flex: 1; }

      display: flex;

    }

      height: 8px;
      border-radius: 9999px;

      min-width: 4px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .count {
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 700;
    }
    .badges {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 700;
    }
    .wrong {
      background: rgba(127, 29, 29, 0.6);
      color: #fee2e2;
    }
    .right {
      background: rgba(6, 78, 59, 0.6);
      color: #d1fae5;
    }
    .card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      background: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #6b7280;
    }
    .stem {
      font-weight: 700;
      margin: 4px 0 0;
      line-height: 1.45;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .option {
      width: 100%;
      text-align: left;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      cursor: pointer;
      font-size: 15px;
      line-height: 1.4;
    }
    .option:hover { background: #f3f4f6; }
    .option.correct {
      background: #dcfce7;
      border-color: #22c55e;
    }
    .option.incorrect {
      background: #fee2e2;

    }

  </style>
</head>
<body>

      </div>
    </div>

      </div>
      <p id="stem" class="stem"></p>
      <div id="options" class="options"></div>
      <div id="explanation" class="explanation" style="display:none;"></div>
      <div class="nav">
        <button onclick="handlePrev()">Previous</button>
        <button onclick="handleNext()">Next</button>
      </div>
    </div>
  </div>

  <script>
    const questions = 
[
  {

  {

  {

  {
    id: 7,
    stem: 'A patient develops abnormal bleeding after starting oral contraceptives. Another patient develops hyperprolactinemia after risperidone use. Which AUB category includes these causes',

  {
    id: 8,
    stem: 'A woman has heavy uterine bleeding but no structural lesion, coagulopathy, ovulatory dysfunction, or medication cause. The lecture suggests decreased uterine PGF2 alpha and increased PGE may contribute. Which AUB category is this',

  {
    id: 9,

  },
  {
    id: 10,
    stem: 'A multiparous woman with prior C-section and D&C has AUB and dysmenorrhea. Ultrasound shows an enlarged uterus. Pathology would show endometrial glands and stroma in the myometrium with hypertrophy of surrounding myometrium. Which AUB category is this',

  {

  },
  {
    id: 13,
    stem: 'A postmenopausal woman with bleeding undergoes TVUS. Endometrial stripe is 3 mm. Which interpretation is most consistent with the lecture',

    options: {

      D: 'D&C must be therapeutic for polyps'

    correct: 'A',
    explanation: 'In postmenopausal women, an endometrial stripe less than 4 mm is unlikely to indicate endometrial hyperplasia or cancer.',
    optionExplanations: {

  },
  {

    correct: 'A',

    optionExplanations: {
      A: 'Correct. >5 mm in a postmenopausal bleeding patient requires biopsy.',
      B: '8 mm is not automatically normal in this context.',

  },
  {
    id: 15,
    stem: 'A 39 year old woman has persistent irregular uterine bleeding. Which sampling method is indicated and has approximately 90 percent diagnostic accuracy',
    topic: 'Endometrial biopsy indications',
    options: {
      A: 'Endometrial biopsy',

      D: 'Wet mount only'
    },
    correct: 'A',
    explanation: 'Endometrial biopsy samples endometrial tissue and is indicated for postmenopausal bleeding or irregular bleeding in women over age 35. It has approximately 90 percent diagnostic accuracy.',
    optionExplanations: {
      A: 'Correct. EMB is indicated in irregular bleeding over age 35 and has about 90 percent diagnostic accuracy.',

  {
    id: 16,
    stem: 'A patient has persistent postmenopausal bleeding despite a negative endometrial biopsy. What is the gold standard definitive diagnostic test for endometrial cancer',

    optionExplanations: {
      A: 'Correct. D&C is definitive/gold standard in the lecture.',

  },
  {

  {

  {
    id: 19,
    stem: 'A patient with endometrial cancer is found to have local extension. Which route of spread is most common according to the lecture',

    options: {
      A: 'Direct extension through myometrium to serosa and cervix',

    },
    correct: 'A',
    explanation: 'Endometrial cancer most commonly spreads by direct extension through the myometrium to serosa and cervix. It can also spread by exfoliation through fallopian tubes, lymphatics, and rarely hematogenously to lung/liver.',
    optionExplanations: {

  {
    id: 20,
    stem: 'A 28 year old woman with heavy menstrual bleeding does not desire pregnancy and malignancy is not suspected. Which management option from the lecture is appropriate',

;

    let currentIndex = 0;
    const answers = {};

    function render() {
      const currentQuestion = questions[currentIndex];
      const selectedChoice = answers[currentQuestion.id] || null;
      const showExplanation = selectedChoice !== null;

      document.getElementById('counter').textContent = `${currentIndex + 1} / ${questions.length}`;
      document.getElementById('questionNumber').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
      document.getElementById('topic').textContent = currentQuestion.topic ? `Topic: ${currentQuestion.topic}` : '';
      document.getElementById('stem').textContent = `${currentQuestion.stem}?`;

      const segments = document.getElementById('segments');
      segments.innerHTML = '';
      questions.forEach((q, idx) => {
        const btn = document.createElement('button');
        btn.className = 'segment ' + (idx === currentIndex ? 'active' : answers[q.id] !== undefined ? 'answered' : 'unanswered');
        btn.title = q.topic || `Question ${idx + 1}`;
        btn.onclick = () => {
          currentIndex = idx;
          render();
        };
        segments.appendChild(btn);
      });

      const options = document.getElementById('options');
      options.innerHTML = '';
      Object.entries(currentQuestion.options).forEach(([letter, text]) => {
        const btn = document.createElement('button');
        const isSelected = selectedChoice === letter;
        const isAnswer = letter === currentQuestion.correct;
        btn.className = 'option';
        if (showExplanation && isAnswer) btn.className += ' correct';
        else if (showExplanation && isSelected && !isAnswer) btn.className += ' incorrect';
        btn.innerHTML = `<strong>${letter}.</strong> ${text}`;
        btn.onclick = () => {
          answers[currentQuestion.id] = letter;
          render();
        };
        options.appendChild(btn);
      });

      const explanation = document.getElementById('explanation');
      if (showExplanation) {
        const isCorrect = selectedChoice === currentQuestion.correct;
        const optionExplanationHtml = Object.entries(currentQuestion.optionExplanations)
          .map(([letter, text]) => `<p><strong>${letter}.</strong> ${text}</p>`)
          .join('');

        explanation.style.display = 'block';
        explanation.innerHTML = `
          <p><strong>Correct answer: ${currentQuestion.correct}</strong> (${currentQuestion.options[currentQuestion.correct]})</p>
          <p class="${isCorrect ? 'green-text' : 'red-text'}">${isCorrect ? 'Nice job. ' : 'Good attempt. '}${currentQuestion.explanation}</p>
          <div class="why-title">Why each option is right or wrong:</div>
          ${optionExplanationHtml}
        `;
      } else {
        explanation.style.display = 'none';
        explanation.innerHTML = '';
      }

      let wrong = 0;
      let right = 0;
      Object.entries(answers).forEach(([qid, choice]) => {
        const q = questions.find((qq) => qq.id === Number(qid));
        if (q && choice === q.correct) right += 1;
        if (q && choice !== q.correct) wrong += 1;
      });
      document.getElementById('wrongCount').textContent = wrong;
      document.getElementById('rightCount').textContent = right;
    }

    function handleNext() {
      currentIndex += 1;
      if (currentIndex >= questions.length) currentIndex = 0;
      render();
    }

    function handlePrev() {
      currentIndex -= 1;
      if (currentIndex < 0) currentIndex = questions.length - 1;
      render();
    }

    render();
  </script>
</body>
</html>
